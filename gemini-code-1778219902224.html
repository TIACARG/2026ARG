<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>後鏡頭畫面與中央圖片</title>
    <style>
        /* 讓畫面全螢幕且不要有邊界與滾動條 */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            height: 100vh;
            overflow: hidden; 
        }

        /* 疊加容器，讓裡面的元素可以相對定位 */
        .camera-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* 底層：相機畫面 */
        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 讓相機畫面填滿螢幕 */
            display: block;
        }

        /* 表層：置中的圖片 */
        .center-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* 完美置中的關鍵 */
            
            /* 您可以在這裡調整圖片的大小 */
            width: 200px; /* 例如固定寬度 200px */
            max-width: 80%; /* 避免圖片在小螢幕手機上超出邊界 */
            
            pointer-events: none; /* 讓圖片不具備點擊事件 */
            z-index: 10; /* 確保圖片永遠蓋在影片上方 */
        }
    </style>
</head>
<body>

    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        
        <img id="centerPic" class="center-image" src="center-img.png" alt="中央圖片">
    </div>

    <script>
        const video = document.getElementById('video');

        // 【修改這裡】將 facingMode 改為 'environment' 即可呼叫後鏡頭
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                console.error("無法存取相機，請確認權限", err);
                alert("請允許網頁存取您的相機！");
            });
    </script>

</body>
</html>
