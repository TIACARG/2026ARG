<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天空過濾器</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            height: 100vh;
            overflow: hidden; 
            font-family: sans-serif;
        }

        .camera-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        .center-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); 
            width: 200px; 
            max-width: 80%; 
            pointer-events: none; 
            z-index: 10; 
        }

        /* --- 新增：權限拒絕時的提示畫面樣式 --- */
        #permission-warning {
            display: none; /* 預設隱藏 */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(30, 30, 30, 0.95);
            color: white;
            padding: 30px 20px;
            border-radius: 12px;
            text-align: center;
            width: 80%;
            max-width: 300px;
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #permission-warning p {
            margin: 0 0 15px 0;
            line-height: 1.5;
            font-size: 16px;
        }

        #retry-btn {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        #retry-btn:active {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        
        <img id="centerPic" class="center-image" src="center-img.png" alt="中央圖片">

        <!-- 新增：權限被拒絕時會彈出的提示框 -->
        <div id="permission-warning">
            <p>📸 無法存取相機</p>
            <p style="font-size: 14px; color: #ccc;">您似乎拒絕了相機權限。<br>請
允許相機權限後重試。</p>
            <button id="retry-btn">重新載入</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const warningBox = document.getElementById('permission-warning');
        const retryBtn = document.getElementById('retry-btn');

        // 將呼叫相機的動作包裝成一個函數
        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(stream => {
                    video.srcObject = stream;
                    warningBox.style.display = 'none'; // 成功取得權限就隱藏警告
                })
                .catch(err => {
                    console.error("無法存取相機，請確認權限", err);
                    // 偵測到錯誤（通常是玩家按了拒絕），把警告框顯示出來
                    warningBox.style.display = 'block';
                });
        }

        // 網頁載入時馬上嘗試開啟相機
        startCamera();

        // 當玩家點擊「我已允許，重新載入」時，強制重新整理網頁
        retryBtn.addEventListener('click', () => {
            window.location.reload(); 
        });
    </script>

</body>
</html>
